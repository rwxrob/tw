<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RWXRob OBS Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: relative;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }
    .topbar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo {
      width: 18px;
      height: 18px;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .bangers {
      font-family: 'Bangers', cursive;
      font-size: 18px;
      letter-spacing: 0.8px;
      color: white;
      white-space: nowrap;
      line-height: 1;
      text-shadow:
        1px 1px 0 #000,
        -1px 1px 0 #000,
        1px -1px 0 #000,
        -1px -1px 0 #000;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="/logo.jpg" alt="Logo">
        </div>
        <div class="bangers">linktr.ee/rwxrob</div>
      </div>
      <div class="bangers" id="topic">{{.Topic}}</div>
      <div class="bangers" id="datetime"></div>
    </div>
  </div>
  <script>
    const el = document.getElementById('topic');

    // SSE: instant push on every title change
    const es = new EventSource('/events');
    es.onmessage = e => { el.textContent = e.data.trim(); };

    // Fallback poll in case SSE drops (OBS browser source quirk)
    async function poll() {
      try {
        const r = await fetch('/');
        el.textContent = (await r.text()).trim();
      } catch (e) {}
    }
    setInterval(poll, 5000);

    function updateDateTime() {
      document.getElementById('datetime').textContent = new Date().toLocaleString(undefined, {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>
</body>
</html>
